<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <title>ელფოსტის ვერიფიკაცია</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f6f6f6;
        font-family:
          "Noto Sans Georgian",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #212121;
      }
      .wrapper {
        width: 100%;
        background: #f6f6f6;
      }
      .container {
        max-width: 520px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow:
          0px 1px 8px rgba(20, 20, 20, 0.08),
          0px 0px 1px rgba(20, 20, 20, 0.12);
      }
      .header {
        background: linear-gradient(90deg, #0bb705 0%, #0ad810 100%);
        padding: 32px 32px;
        text-align: center;
      }
      .logo {
        display: inline-block;
        font-size: 26px;
        font-weight: 700;
        color: #ffffff !important;
        letter-spacing: -0.5px;
        text-decoration: none;
      }
      .logo:visited,
      .logo:hover,
      .logo:active {
        color: #ffffff !important;
        text-decoration: none;
      }
      .body {
        padding: 40px 40px 36px;
        text-align: center;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        color: #212121;
        margin-bottom: 10px;
        letter-spacing: -0.3px;
      }
      .intro {
        font-size: 15px;
        color: #6d6d6d;
        line-height: 1.6;
        margin-bottom: 28px;
      }
      .code-wrapper {
        display: inline-block;
        background: #f4faf5;
        border: 1px solid #def1e0;
        border-radius: 16px;
        padding: 22px 40px;
        margin-bottom: 24px;
      }
      .code {
        font-family: "SF Mono", "Courier New", monospace;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 12px;
        color: #1aa44a;
        text-indent: 12px;
      }
      .meta {
        font-size: 13px;
        color: #888888;
        line-height: 1.5;
        margin-top: 4px;
      }
      .divider {
        height: 1px;
        background: #e7e7e7;
        margin: 32px 0 24px;
      }
      .hint {
        font-size: 12px;
        color: #888888;
        line-height: 1.6;
        text-align: center;
      }
      .footer {
        padding: 20px 32px 28px;
        text-align: center;
        font-size: 12px;
        color: #888888;
      }
      .footer a {
        color: #1aa44a;
        text-decoration: none;
        font-weight: 600;
      }
      @media (max-width: 600px) {
        .container {
          border-radius: 16px;
        }
        .header {
          padding: 28px 24px;
        }
        .logo {
          font-size: 22px;
        }
        .body {
          padding: 32px 24px 28px;
        }
        .title {
          font-size: 18px;
        }
        .intro {
          font-size: 14px;
          margin-bottom: 24px;
        }
        .code-wrapper {
          padding: 18px 28px;
        }
        .code {
          font-size: 32px !important;
          letter-spacing: 8px !important;
          text-indent: 8px;
        }
      }
    </style>
  </head>
  <body>
    <table
      class="wrapper"
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
    >
      <tr>
        <td align="center" style="padding: 40px 16px">
          <table
            class="container"
            role="presentation"
            cellpadding="0"
            cellspacing="0"
          >
            <tr>
              <td class="header">
                <a
                  href="https://tene.ge"
                  class="logo"
                  style="color: #ffffff; text-decoration: none"
                  >Tene</a
                >
              </td>
            </tr>
            <tr>
              <td class="body">
                <div class="title">ელფოსტის ვერიფიკაცია</div>
                <p class="intro">გამოიყენეთ ქვემოთ მოცემული კოდი</p>
                <div class="code-wrapper">
                  <div class="code">{{verification_code}}</div>
                </div>
                <div class="meta">კოდი ვალიდურია 5 წუთის განმავლობაში</div>
              </td>
            </tr>
            <tr>
              <td class="footer">
                © Tene · <a href="https://tene.ge">tene.ge</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
